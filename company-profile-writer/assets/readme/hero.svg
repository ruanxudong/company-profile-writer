<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">company-profile-writer</title>
  <desc id="desc">A README hero showing a Chinese company profile writing workflow from discovery questions to polished profile versions.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eef7f3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#c08a2c"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d6d3c7"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" rx="28" fill="#111827"/>
  <rect x="18" y="18" width="1164" height="344" rx="22" fill="url(#paper)"/>
  <rect x="18" y="18" width="1164" height="344" rx="22" fill="url(#dots)" opacity="0.32"/>

  <g transform="translate(64 54)">
    <rect x="0" y="0" width="170" height="30" rx="15" fill="#e6f4ef"/>
    <text x="18" y="20" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="14" font-weight="700" fill="#0f766e">CODEx Skill</text>

    <text x="0" y="86" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="58" font-weight="800" fill="#111827">company-profile-writer</text>
    <text x="0" y="128" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="25" font-weight="600" fill="#374151">中文企业简介撰写专家</text>

    <text x="0" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="19" fill="#4b5563">先收集关键事实，再按企业阶段、使用场景和目标版本输出</text>
    <text x="0" y="208" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="19" fill="#4b5563">官网、招商、融资、品牌手册和发布会可直接改稿的公司介绍。</text>

    <g transform="translate(0 256)">
      <rect x="0" y="0" width="128" height="34" rx="17" fill="#111827"/>
      <text x="19" y="23" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#ffffff">Mini</text>
      <rect x="144" y="0" width="128" height="34" rx="17" fill="#0f766e"/>
      <text x="166" y="23" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#ffffff">Standard</text>
      <rect x="288" y="0" width="128" height="34" rx="17" fill="#c08a2c"/>
      <text x="321" y="23" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#ffffff">Pro</text>
      <rect x="432" y="0" width="164" height="34" rx="17" fill="#374151"/>
      <text x="459" y="23" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#ffffff">Brand Manual</text>
    </g>
  </g>

  <g transform="translate(744 58)">
    <rect x="0" y="0" width="372" height="264" rx="20" fill="#ffffff" stroke="#d6d3c7"/>
    <rect x="24" y="24" width="142" height="24" rx="12" fill="#ecfdf5"/>
    <text x="42" y="41" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#0f766e">Phase 0-1</text>
    <text x="24" y="84" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="27" font-weight="800" fill="#111827">先问后写</text>
    <text x="24" y="119" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="16" fill="#4b5563">成立时间 · 使用场景 · 公司基本盘</text>
    <text x="24" y="146" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="16" fill="#4b5563">定位 · 业务 · 优势 · 证据 · 使命</text>
    <path d="M28 184 H344" stroke="#e5e7eb" stroke-width="2"/>
    <circle cx="44" cy="221" r="13" fill="#0f766e"/>
    <circle cx="116" cy="221" r="13" fill="#c08a2c"/>
    <circle cx="188" cy="221" r="13" fill="#111827"/>
    <path d="M57 221 H103 M129 221 H175 M201 221 H286" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
    <text x="302" y="226" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#6b7280">draft</text>
  </g>

  <g transform="translate(998 84)">
    <rect x="0" y="0" width="84" height="34" rx="17" fill="url(#accent)"/>
    <text x="18" y="23" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="800" fill="#ffffff">5W1H</text>
  </g>
</svg>
